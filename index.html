<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roxy Art's Creations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        .font-roxy { font-family: 'Lobster Two', cursive; }
        .font-arts { font-family: 'Quicksand', sans-serif; }
        
        /* Custom Colors from your Logo */
        .text-roxy-purple { color: #5B2E91; }
        .text-roxy-teal { color: #008B8B; }
        .hover-teal:hover { color: #008B8B; }
        .border-roxy-teal { border-color: #008B8B; }

        /* Lightbox Overlay Styles */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body class="bg-white text-zinc-900">

    <div class="pt-12 text-center">
        <a href="index.html">
            <img src="images/roxyartsclipped.png" alt="Roxy Arts Logo" class="mx-auto w-80 md:w-[28rem] h-auto">
        </a>
    </div>

    <nav class="p-6 flex flex-col md:flex-row justify-between items-center max-w-6xl mx-auto font-arts uppercase tracking-wider">
        <h1 class="text-xl md:text-2xl font-bold mb-4 md:mb-0">
            <span class="text-roxy-purple">Roxy</span> 
            <span class="text-roxy-teal">Arts Studio</span>
        </h1>
        <div class="space-x-8 text-sm font-bold">
            <a href="#" class="hover-teal transition">Gallery</a>
            <a href="#" class="hover-teal transition">About Us</a>
            <span class="text-zinc-300 cursor-not-allowed">Shop</span>
        </div>
    </nav>

    <header class="py-16 px-6 text-center max-w-3xl mx-auto">
        <h2 class="text-6xl font-roxy text-roxy-purple mb-4">Handmade. Eccentric. Ours.</h2>
        <p class="font-arts text-zinc-500 text-lg">A collection of physical artifacts and digital experiments.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="group cursor-pointer gallery-card" onclick="openLightbox('images/thissite.png')">
                <div class="aspect-square bg-zinc-100 overflow-hidden mb-4 rounded-xl border border-zinc-100 group-hover:border-roxy-teal transition-all">
                    <img src="images/thissite.png" alt="Artwork 1" class="object-cover w-full h-full">
                </div>
                <h3 class="text-xl font-roxy text-roxy-purple">The First Creation</h3>
                <p class="font-arts text-sm text-zinc-400 italic">This site</p>
            </div>

            <div class="group cursor-pointer gallery-card" onclick="openLightbox('images/bouqet2.jpg')">
                <div class="aspect-square bg-zinc-100 overflow-hidden mb-4 rounded-xl border border-zinc-100 group-hover:border-roxy-teal transition-all">
                    <img src="images/bouqet4.png" alt="Artwork 2" class="object-cover w-full h-full">
                </div>
                <h3 class="text-xl font-roxy text-roxy-purple">Ribbon Bouquet</h3>
                <p class="font-arts text-sm text-zinc-400 italic">Medium: Ribbon</p>
            </div>

            <div class="group cursor-pointer gallery-card" onclick="openLightbox('images/wcp.jpg')">
                <div class="aspect-square bg-zinc-100 overflow-hidden mb-4 rounded-xl border border-zinc-100 group-hover:border-roxy-teal transition-all">
                    <img src="images/wcp.jpg" alt="Artwork 3" class="object-cover w-full h-full">
                </div>
                <h3 class="text-xl font-roxy text-roxy-purple">WCP Bouquet</h3>
                <p class="font-arts text-sm text-zinc-400 italic">Medium: Ribbon</p>
            </div>

        </div>
    </main>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="">
    </div>

    <footer class="p-10 text-center border-t border-zinc-100 font-arts text-xs text-zinc-400 uppercase tracking-widest">
        &copy; 2026 Roxy Arts Studio.
    </footer>

    <script>
        function openLightbox(imagePath) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            
            lightboxImg.src = imagePath;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Stop scrolling
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto'; // Back to scrolling
        }
    </script>

</body>
</html>
